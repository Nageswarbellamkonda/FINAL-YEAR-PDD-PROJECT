name: Nyayamitra CI/CD Pipeline

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  test_and_build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'
          cache-dependency-path: './PROJECTS/WEB_PROJECT/package-lock.json'
          
      - name: Install dependencies
        run: cd PROJECTS/WEB_PROJECT && npm ci
        
      - name: Build project
        run: cd PROJECTS/WEB_PROJECT && npm run build
        
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
          
      - name: Install Testing Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest selenium pytest-html openpyxl pandas
          
      - name: Run Tests & Generate Reports
        run: |
          cd PROJECTS/WEB_PROJECT
          pytest Testing/Selenium/test_nyayamitra.py --html=Reports/Selenium_Report.html || true
          
      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v5
        
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './PROJECTS/WEB_PROJECT/dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: test_and_build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
